<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Cs Comparative Analysis Charts</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #12192c;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .charts-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }
        .chart-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chart-canvas-wrapper {
            position: relative;
            height: 300px;
            width: 100%;
        }
        .chart-label {
            position: absolute;
            color: #f5a623;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        .label-above {
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        .label-right {
            right: -40px;
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
        }
        .label-bottom {
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        h1 {
            color: #f5a623;
            text-align: center;
            margin-bottom: 20px;
            font-size: 32px;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-bottom: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>3Cs Comparative Analysis</h1>
        <p class="subtitle">Performance gains with Curiosity, Lifelong Learning, and Agility & Adaptability</p>

        <div class="charts-wrapper">
            <!-- Bar Chart -->
            <div class="chart-card">
                <div class="chart-label label-above">+38% Performance</div>
                <div class="chart-canvas-wrapper">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <!-- Line/Area Chart -->
            <div class="chart-card">
                <div class="chart-label label-right">+215% Growth</div>
                <div class="chart-canvas-wrapper">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>

            <!-- Radar Chart -->
            <div class="chart-card">
                <div class="chart-label label-bottom">+64% Capability</div>
                <div class="chart-canvas-wrapper">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chartDefaults = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: {
                        color: 'rgba(255, 255, 255, 0.7)',
                        font: { size: 12 }
                    }
                }
            },
            scales: {
                r: {
                    ticks: { color: 'rgba(255, 255, 255, 0.5)' },
                    grid: { color: 'rgba(255, 255, 255, 0.1)' }
                },
                x: {
                    ticks: { color: 'rgba(255, 255, 255, 0.7)' },
                    grid: { color: 'rgba(255, 255, 255, 0.05)' }
                },
                y: {
                    ticks: { color: 'rgba(255, 255, 255, 0.7)' },
                    grid: { color: 'rgba(255, 255, 255, 0.05)' }
                }
            }
        };

        // Bar Chart
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: ['Avg Emp 1', 'Avg Emp 2', 'Avg Emp 3', 'Avg Emp 4', 'Curious 1', 'Curious 2'],
                datasets: [
                    {
                        label: 'Average Employee',
                        data: [65, 68, 62, 70, 58, 65],
                        backgroundColor: 'rgba(255, 255, 255, 0.15)',
                        borderColor: 'rgba(255, 255, 255, 0.3)',
                        borderWidth: 1
                    },
                    {
                        label: 'High Curiosity',
                        data: [92, 94, 89, 96, 98, 95],
                        backgroundColor: '#00d4ff',
                        borderColor: '#00d4ff',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                ...chartDefaults,
                animation: {
                    duration: 800,
                    easing: 'easeOutCubic'
                }
            }
        });

        // Line/Area Chart
        new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: {
                labels: ['Year 1', 'Year 2', 'Year 3', 'Year 4', 'Year 5'],
                datasets: [
                    {
                        label: 'Average Skills',
                        data: [20, 30, 40, 50, 60],
                        borderColor: 'rgba(255, 255, 255, 0.4)',
                        backgroundColor: 'rgba(255, 255, 255, 0.05)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(255, 255, 255, 0.3)',
                        pointBorderColor: 'rgba(255, 255, 255, 0.5)',
                        pointRadius: 4
                    },
                    {
                        label: 'Agile & Adaptable',
                        data: [45, 75, 110, 150, 190],
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 2,
                        pointBackgroundColor: '#00d4ff',
                        pointBorderColor: '#00d4ff',
                        pointRadius: 5
                    }
                ]
            },
            options: {
                ...chartDefaults,
                animation: {
                    duration: 1000,
                    easing: 'easeOutCubic'
                },
                scales: {
                    ...chartDefaults.scales,
                    y: {
                        ...chartDefaults.scales.y,
                        beginAtZero: true,
                        max: 200
                    }
                }
            }
        });

        // Radar Chart
        new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: {
                labels: [
                    'Speed to New Tech',
                    'Effectiveness in Pivoting',
                    'Resilience to Shifts',
                    'Proactive Innovation',
                    'Speed to New Tech'
                ],
                datasets: [
                    {
                        label: 'Average Employee',
                        data: [60, 55, 65, 50, 60],
                        borderColor: 'rgba(255, 255, 255, 0.3)',
                        backgroundColor: 'rgba(255, 255, 255, 0.08)',
                        pointBackgroundColor: 'rgba(255, 255, 255, 0.3)',
                        pointBorderColor: 'rgba(255, 255, 255, 0.5)',
                        borderWidth: 2
                    },
                    {
                        label: 'Agile & Adaptable',
                        data: [95, 88, 98, 92, 95],
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.15)',
                        pointBackgroundColor: '#00d4ff',
                        pointBorderColor: '#00d4ff',
                        pointRadius: 5,
                        borderWidth: 2.5
                    }
                ]
            },
            options: {
                ...chartDefaults,
                animation: {
                    duration: 1000,
                    easing: 'easeOutCubic'
                },
                scales: {
                    r: {
                        ...chartDefaults.scales.r,
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            ...chartDefaults.scales.r.ticks,
                            stepSize: 20
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
